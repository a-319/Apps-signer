name: Sign App Archives

on:
  push:
    paths:
      - 'uploads/**'
      - '**/*.apk'
  workflow_dispatch:

jobs:
  sign_and_package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        run: |
          # שימוש ב-Heredoc כדי להעביר את הסוד בבטחה לפייתון
          python3 << 'EOF'
          import base64
          import os
          
          # קריאת הסוד ישירות מהסביבה של גיטהאב
          secret_data = """${{ secrets.KEYSTORE_FILE }}""".strip()
          
          try:
              # ניסיון פענוח
              decoded_data = base64.b64decode(secret_data, validate=False)
              with open("release.jks", "wb") as f:
                  f.write(decoded_data)
              print("Decoding successful.")
          except Exception as e:
              print(f"Decoding failed: {e}")
              exit(1)
          EOF
          
          # בדיקה מה נוצר
          echo "Detecting file type..."
          file release.jks
          
          # אם הקובץ עדיין מזוהה כטקסט, סימן שהסוד בגיטהאב הוא לא Base64 תקין
          if file release.jks | grep -q "text"; then
            echo "-------------------------------------------------------"
            echo "ERROR: The file is STILL text."
            echo "This means the value in GitHub Secrets is not a valid Base64 string."
            echo "It likely contains headers, spaces, or is just the raw file content."
            echo "-------------------------------------------------------"
            exit 1
          fi

      - name: Process and Sign Files
        run: |
          mkdir -p signed_packages
          find . -type f -name "*.apk" | while read file; do
            if [[ "$file" == *"signed_packages"* ]]; then continue; fi
            
            filename=$(basename "$file")
            zip_name="${filename%.*}.zip"
            
            echo "Packing and Signing: $filename"
            zip -j "signed_packages/$zip_name" "$file"
            
            jarsigner -keystore release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              -digestalg SHA-256 \
              -sigalg SHA256withRSA \
              "signed_packages/$zip_name" \
              "${{ secrets.KEY_ALIAS }}"
          done

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-apps-collection
          path: signed_packages/
