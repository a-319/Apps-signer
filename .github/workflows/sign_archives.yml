name: Sign App Archives

on:
  push:
    paths:
      - 'uploads/**'
      - '**/*.apk'
      - '**/*.xapk'
  workflow_dispatch:

jobs:
  sign_and_package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        env:
          K_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          # 1. ניקוי יסודי של רווחים ופענוח עם התעלמות מתווים לא חוקיים (Garbage)
          echo "$K_FILE" | tr -d '[:space:]' | base64 --decode --ignore-garbage > release.jks
          
          # 2. בדיקת תקינות הקובץ
          if [ ! -s release.jks ]; then
            echo "Error: Resulting keystore file is empty!"
            exit 1
          fi
          
          # 3. הדפסת מידע ללוג (עוזר לאתר אם הקובץ הוא באמת Keystore)
          echo "File info:"
          file release.jks
          echo "File size: $(stat -c%s release.jks) bytes"

      - name: Process and Sign Files
        run: |
          mkdir -p signed_packages
          
          # חיפוש קבצים (נמנע מתיקיית הפלט)
          find . -type f \( -name "*.apk" -o -name "*.xapk" \) | while read file; do
            if [[ "$file" == *"signed_packages"* ]]; then continue; fi
            
            filename=$(basename "$file")
            zip_name="${filename%.*}.zip"
            
            echo "------------------------------------------"
            echo "Packing and Signing: $filename"
            
            # אריזה ל-ZIP
            zip -j "signed_packages/$zip_name" "$file"
            
            # חתימה - הסרנו את ה-storetype כדי לאפשר זיהוי אוטומטי
            # הוספנו גרשיים סביב הסיסמאות למקרה שיש בהן תווים מיוחדים
            jarsigner -keystore release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              -digestalg SHA-256 \
              -sigalg SHA256withRSA \
              "signed_packages/$zip_name" \
              "${{ secrets.KEY_ALIAS }}"
              
            echo "Successfully created: $zip_name"
          done

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-apps-collection
          path: signed_packages/
          retention-days: 5
