name: Sign App Archives

on:
  push:
    paths:
      - 'uploads/**'
      - '**/*.apk'
  workflow_dispatch:

jobs:
  sign_and_package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        env:
          K_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          # ניקוי אגרסיבי של רווחים, ירידות שורה ותווים מיוחדים
          # ואז פענוח ישירות לקובץ
          echo "$K_FILE" | tr -d '\n\r ' | base64 --decode > release.jks
          
          # בדיקה ויזואלית ללוג - אם נראה "ASCII text", הפענוח נכשל
          file release.jks
          
          # וידוא שהקובץ אינו טקסטואלי (Keystore חייב להיות Data)
          if file release.jks | grep -q "text"; then
            echo "ERROR: Keystore is still in text format! Decoding failed."
            exit 1
          fi

      - name: Process and Sign Files
        run: |
          mkdir -p signed_packages
          
          find . -type f -name "*.apk" | while read file; do
            if [[ "$file" == *"signed_packages"* ]]; then continue; fi
            
            filename=$(basename "$file")
            zip_name="${filename%.*}.zip"
            
            echo "------------------------------------------"
            echo "Packing and Signing: $filename"
            
            zip -j "signed_packages/$zip_name" "$file"
            
            # ניסיון חתימה
            jarsigner -keystore release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              -digestalg SHA-256 \
              -sigalg SHA256withRSA \
              "signed_packages/$zip_name" \
              "${{ secrets.KEY_ALIAS }}"
              
            echo "Success!"
          done

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-apps-collection
          path: signed_packages/
