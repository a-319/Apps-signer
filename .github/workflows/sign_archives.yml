name: Sign App Archives

on:
  push:
    paths:
      - 'uploads/**'
      - '**/*.apk'
  workflow_dispatch:

jobs:
  sign_and_package:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode Keystore
        env:
          K_FILE: ${{ secrets.KEYSTORE_FILE }}
        run: |
          # שימוש בפייתון כדי להבטיח פענוח בינארי תקין ללא תלות ב-Shell
          python3 -c "import base64, os; data = os.environ['K_FILE'].strip(); open('release.jks', 'wb').write(base64.b64decode(data))"
          
          # בדיקה שהקובץ פוענח כראוי (אמור להציג 'Data' או 'Java KeyStore' ולא 'ASCII')
          echo "File type detection:"
          file release.jks
          
          if file release.jks | grep -q "text"; then
            echo "ERROR: Decoding failed - File is still text. Check if your Secret is valid Base64."
            exit 1
          fi

      - name: Process and Sign Files
        run: |
          mkdir -p signed_packages
          
          # חיפוש קבצי APK
          find . -type f -name "*.apk" | while read file; do
            if [[ "$file" == *"signed_packages"* ]]; then continue; fi
            
            filename=$(basename "$file")
            zip_name="${filename%.*}.zip"
            
            echo "------------------------------------------"
            echo "Packing and Signing: $filename"
            
            # אריזה ל-ZIP
            zip -j "signed_packages/$zip_name" "$file"
            
            # חתימה עם jarsigner
            jarsigner -keystore release.jks \
              -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
              -keypass "${{ secrets.KEY_PASSWORD }}" \
              -digestalg SHA-256 \
              -sigalg SHA256withRSA \
              "signed_packages/$zip_name" \
              "${{ secrets.KEY_ALIAS }}"
              
            echo "Success: $zip_name created and signed."
          done

      - name: Upload Signed Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: signed-apps-collection
          path: signed_packages/
